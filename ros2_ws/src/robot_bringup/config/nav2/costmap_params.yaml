local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      # Update and publish rates
      update_frequency: 5.0
      publish_frequency: 2.0

      # Frame config
      global_frame: odom
      robot_base_frame: base_footprint

      # Rolling window — follows robot
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      # Robot footprint — using radius since your robot is roughly circular
      # chassis is 0.20L x 0.28W → half diagonal = 0.17m + small margin
      robot_radius: 0.20

      # Layers
      plugins: [voxel_layer, inflation_layer]

      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 10
        max_obstacle_height: 2.0
        mark_threshold: 2
        observation_sources: scan
        scan:
          topic: /scan_fixed
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
          observation_persistence: 0.1


      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.0
        inflation_radius: 0.25

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      # Update rates — slower than local is fine
      update_frequency: 3.0
      publish_frequency: 1.0

      # Frame config
      global_frame: map
      robot_base_frame: base_footprint

      # Covers entire map
      robot_radius: 0.20
      resolution: 0.05        # must match your map_iter_2.yaml resolution
      track_unknown_space: true

      # Layers
      plugins: [static_layer, obstacle_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      observation_persistence: 0.1

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_fixed
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
          observation_persistence: 0.1


      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.0
        inflation_radius: 0.25

      always_send_full_costmap: true