controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3  #Not in Docs
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    current_progress_checker: progress_checker  # must match the name under progress_checker_plugins
    goal_checker_plugins: ["goal_checker"]
    current_goal_checker: goal_checker          # must match the name under goal_checker_plugins
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: nav2_graceful_controller::GracefulController
      transform_tolerance: 0.1 #Not in Docs
      motion_target_dist: 0.6 #Not in DOCS
      max_robot_pose_search_dist: 10.0 #Not in Docs
      k_phi: 3.0 #In Docs example the value is 2.0
      k_delta: 2.0 #In Docs example the value is 1.0
      beta: 0.4 
      lambda: 2.0
      v_linear_min: 0.05 #In Docs example value is 0.1
      v_linear_max: 0.5           # same max as others
      v_angular_max: 1.0  #In Docs value is 5.0
      slowdown_radius: 1.0 #In Docs value is 1.5
      initial_rotation: true
      initial_rotation_min_angle: 0.785
      final_rotation: true
      rotate_to_heading_angular_vel: 1.0

      # EXTRA PARAMS FROM DOCS EXAMPLE
      min_lookahead: 0.25
      max_lookahead: 1.0
      initial_rotation: true
      initial_rotation_threshold: 0.75
      prefer_final_rotation: true
      allow_backward: false

      v_angular_min_in_place: 0.25
      footprint_scaling_linear_vel: 0.5
      footprint_scaling_factor: 0.25
      footprint_scaling_step: 0.1
      obstacle_cost_margin: 1
      final_rotation_search_step: 0.1