amcl:
  ros__parameters:
    use_sim_time: true

    # Differential drive motion model
    robot_model_type: nav2_amcl::DifferentialMotionModel

    # Motion noise — how much to distrust odometry
    alpha1: 0.2   # noise from rotation in rotation
    alpha2: 0.2   # noise from translation in rotation
    alpha3: 0.2   # noise from translation in translation
    alpha4: 0.2   # noise from rotation in translation
    alpha5: 0.2   # unused for differential drive

    # Frames
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map

    # Scan config — must match your setup
    scan_topic: /scan_fixed
    laser_model_type: likelihood_field
    laser_min_range: 0.15
    laser_max_range: 8.0
    laser_likelihood_max_dist: 2.0
    max_beams: 60

    # Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # Update thresholds — only update when robot moves enough
    update_min_d: 0.25    # 25cm movement
    update_min_a: 0.2     # 0.2 rad rotation

    # TF
    tf_broadcast: true
    transform_tolerance: 1.0

    # Pose saving
    save_pose_rate: 0.5

    # Beam skip — ignore outlier beams
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # Recovery
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # Likelihood field params
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1